<!DOCTYPE html>
<html>
<head>
    <title>Register - Amoxicillin Health System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body class="auth-body">

<!-- AUTH CONTAINER -->
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-logo">💊 Amoxicillin</h1>
            <p class="auth-subtitle">Health Management System</p>
        </div>

        <form id="registerForm" class="auth-form">
            <h2>Daftar Akun</h2>

            <div class="form-group">
                <label for="name">Nama Lengkap</label>
                <input type="text" id="name" name="name" placeholder="masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="masukkan email" required>
            </div>

            <div class="form-group">
                <label for="phone">No. HP</label>
                <input type="tel" id="phone" name="phone" placeholder="contoh: 08123456789" required>
            </div>

            <div class="form-group">
                <label for="role">Daftar Sebagai</label>
                <select id="role" name="role" required onchange="updateFormFields()">
                    <option value="">-- Pilih Role --</option>
                    <option value="doctor">Dokter</option>
                    <option value="patient">Pasien</option>
                </select>
            </div>

            <!-- Field khusus dokter -->
            <div id="doctorFields" class="form-group" style="display:none;">
                <label for="doctorId">ID/Lisensi Dokter</label>
                <input type="text" id="doctorId" name="doctorId" placeholder="masukkan nomor lisensi">
            </div>

            <!-- Field khusus pasien -->
            <div id="patientFields" class="form-group" style="display:none;">
                <label for="ktp">No. KTP/ID</label>
                <input type="text" id="ktp" name="ktp" placeholder="masukkan nomor KTP">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="minimal 6 karakter" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="konfirmasi password" required>
            </div>

            <button type="submit" class="btn-login">Daftar</button>
        </form>

        <div class="auth-footer">
            <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
        </div>
    </div>
</div>

<!-- Script -->
<script src="script-register.js"></script>

</body>
</html>
