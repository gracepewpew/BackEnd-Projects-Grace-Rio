<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Suster - Amoxicillin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">💊 Amoxicillin</h2>

        <div class="user-info">
            <p id="userName">User</p>
            <p id="userRole" class="user-role">Role</p>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 15px 0;">

        <!-- Daftar Menu -->
        <nav class="menu">
            <p class="menu-title">Daftar</p>
            <a href="index.html">🧑‍⚕️ Daftar Pasien</a>
            <a href="dokter.html">👨‍⚕️ Daftar Dokter</a>
            <a href="suster.html">👩‍⚕️ Daftar Suster</a>
        </nav>

        <!-- Aktivitas Menu -->
        <nav class="menu">
            <p class="menu-title">Aktivitas</p>
            <a href="inquiry.html">🔍 Inquiry Pasien</a>
            <a href="kunjungan.html">🏥 Permintaan Kunjungan</a>
        </nav>

        <!-- Persediaan Menu -->
        <nav class="menu">
            <p class="menu-title">Persediaan</p>
            <a href="persediaan.html">📦 Daftar Persediaan</a>
            <a href="adjust.html">🔄 Adjust Persediaan</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <h1>Data Suster</h1>

        <!-- Action Bar -->
        <div class="action-bar">
            <button class="btn-primary" id="addSusterBtn">+ Tambah Suster</button>
            <div class="search-bar">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Cari nama, kode suster, divisi..."
                />
            </div>
        </div>

        <!-- Table Container -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nama Suster</th>
                        <th>Divisi</th>
                        <th>Jenis Kelamin</th>
                        <th>No. Telepon</th>
                        <th>Email</th>
                        <th>Shift</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="susterTable">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal for Add/Edit (hidden by default) -->
    <div id="susterModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle">Tambah Suster</h2>
            
            <form id="susterForm">
                <label for="code">Kode Suster:</label>
                <input type="text" id="code" placeholder="Contoh: S001" required>
                
                <label for="name">Nama Suster:</label>
                <input type="text" id="name" required>
                
                <label for="gender">Jenis Kelamin:</label>
                <select id="gender" required>
                    <option value="">-- Pilih --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
                
                <label for="phone">No. Telepon:</label>
                <input type="tel" id="phone" pattern="[0-9]+" placeholder="Nomor telepon (angka saja)" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                
                <label for="division">Divisi:</label>
                <select id="division" required>
                    <option value="">-- Pilih --</option>
                    <option value="ICU">ICU</option>
                    <option value="Bedah">Bedah</option>
                    <option value="Pediatri">Pediatri</option>
                    <option value="Maternitas">Maternitas</option>
                    <option value="Penyakit Dalam">Penyakit Dalam</option>
                    <option value="Gigi">Gigi</option>
                    <option value="Mata">Mata</option>
                    <option value="Darurat">Darurat</option>
                </select>
                
                <label for="shift">Shift:</label>
                <select id="shift" required>
                    <option value="">-- Pilih --</option>
                    <option value="Pagi">Pagi (06:00 - 14:00)</option>
                    <option value="Siang">Siang (14:00 - 22:00)</option>
                    <option value="Malam">Malam (22:00 - 06:00)</option>
                </select>
                
                <label for="status">Status:</label>
                <select id="status" required>
                    <option value="">-- Pilih --</option>
                    <option value="Aktif">Aktif</option>
                    <option value="Tidak Aktif">Tidak Aktif</option>
                    <option value="Cuti">Cuti</option>
                </select>
                
                <div class="form-buttons">
                    <button type="submit" class="btn-primary">Simpan</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script-auth.js"></script>
    <script src="script-suster.js"></script>
</body>
</html>
