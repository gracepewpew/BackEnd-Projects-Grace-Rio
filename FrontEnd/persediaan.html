<!DOCTYPE html>
<html>
<head>
    <title>Persediaan Obat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2 class="logo">💊 Amoxicillin</h2>

    <div class="user-info">
        <p id="userName">User</p>
        <p id="userRole" class="user-role">Role</p>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 15px 0;">

    <div class="menu">
        <p class="menu-title">Daftar</p>
        <a href="index.html">🧑‍⚕️ Daftar Pasien</a>
        <a href="dokter.html">👨‍⚕️ Daftar Dokter</a>
        <a href="suster.html">👩‍⚕️ Daftar Suster</a>
    </div>

    <div class="menu">
        <p class="menu-title">Aktivitas</p>
        <a href="inquiry.html">🔍 Inquiry Pasien</a>
        <a href="kunjungan.html">🏥 Permintaan Kunjungan</a>
    </div>

    <div class="menu">
        <p class="menu-title">Persediaan</p>
        <a href="persediaan.html">📦 Daftar Persediaan</a>
        <a href="adjust.html">🔄 Adjust Persediaan</a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <h1>Daftar Persediaan Obat</h1>

    <!-- BUTTON -->
    <div class="action-bar">
        <button class="btn-primary" onclick="toggleForm()">+ Tambah Obat</button>
    </div>

    <!-- FORM MULTI INPUT -->
    <div id="formObat" class="card" style="display:none;">
        <h3>Tambah Obat</h3>

        <div id="formContainer">
            <div class="form-item">
                <input type="text" placeholder="Nama Obat">
                <input type="text" placeholder="Jenis">
                <input type="number" placeholder="Stok">
                <input type="text" placeholder="Satuan">
                <input type="date">
            </div>
        </div>

        <div class="form-buttons">
            <button class="btn-primary" onclick="addForm()">+ Tambah Baris</button>
            <button class="btn-primary">Simpan Semua</button>
            <button class="btn-cancel" onclick="toggleForm()">Batal</button>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
        <input type="text" id="searchObat" placeholder="Cari obat...">
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nama Obat</th>
                    <th>Jenis</th>
                    <th>Stok</th>
                    <th>Satuan</th>
                    <th>Expired</th>
                    <th>Reserve</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="obatTable">
                <!-- Data will be populated by JavaScript -->
            </tbody>
        </table>
    </div>

</div>

<!-- Image Modal for expanding pictures -->
<div id="imageModal" class="image-modal">
    <div class="image-modal-content">
        <span class="close" id="closeImageModal">&times;</span>
        <img id="expandedImage" src="" alt="Expanded Medicine Image">
    </div>
</div>

<!-- Script -->
<script src="script-auth.js"></script>
<script src="script-persediaan.js"></script>

</body>
</html>
